name: Version and Notify Repository

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'CONTRIBUTORS.md'
  workflow_dispatch:
    inputs:
      bump_if_needed:
        description: 'Bump addon.xml patch version when addon files changed without a version bump'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

env:
  ADDON_ID: plugin.video.twitch
  REPOSITORY_REPO: Serph91P/repository.serph91p

jobs:
  version-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout add-on
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version state
        id: detect
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          BUMP_IF_NEEDED: ${{ inputs.bump_if_needed || 'true' }}
        run: |
          set -euo pipefail
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import xml.etree.ElementTree as ET
          from pathlib import Path

          event_name = os.environ.get('GITHUB_EVENT_NAME', '')
          before = os.environ.get('GITHUB_EVENT_BEFORE') or ''
          after = os.environ.get('GITHUB_SHA', '')

          def run(*args, check=True):
              return subprocess.run(args, text=True, stdout=subprocess.PIPE,
                                    stderr=subprocess.PIPE, check=check)

          def addon_version_from_text(text):
              return ET.fromstring(text).attrib['version']

          current_xml = Path('addon.xml').read_text(encoding='utf-8')
          current_version = addon_version_from_text(current_xml)

          previous_version = ''
          changed_files = []
          if before and before != '0' * 40:
              previous_xml = run('git', 'show', f'{before}:addon.xml', check=False)
              if previous_xml.returncode == 0:
                  previous_version = addon_version_from_text(previous_xml.stdout)
              diff = run('git', 'diff', '--name-only', before, after, check=False)
              if diff.returncode == 0:
                  changed_files = [line.strip() for line in diff.stdout.splitlines() if line.strip()]
          else:
              diff = run('git', 'diff', '--name-only', 'HEAD^', 'HEAD', check=False)
              if diff.returncode == 0:
                  changed_files = [line.strip() for line in diff.stdout.splitlines() if line.strip()]

          ignored_prefixes = ('.github/', 'docs/')
          ignored_exact = {'.gitignore', 'LICENSE', 'CONTRIBUTORS.md', 'README.md'}
          ignored_suffixes = ('.md',)

          def is_addon_file(path):
              if path in ignored_exact:
                  return False
              if path.startswith(ignored_prefixes):
                  return False
              if path.endswith(ignored_suffixes):
                  return False
              return True

          addon_changed = any(is_addon_file(path) for path in changed_files)
          version_changed = bool(previous_version) and previous_version != current_version
          bot_bump_commit = run('git', 'log', '-1', '--pretty=%s').stdout.startswith('chore: bump plugin.video.twitch to ')

          # Manual runs should be able to force a repository notification, but only
          # push runs auto-bump. Bot bump push runs skip because the first run already
          # dispatches the repository with the bumped SHA.
          bump_if_needed = os.environ.get('BUMP_IF_NEEDED', 'true').lower() == 'true'
          should_bump = (
              bump_if_needed
              and event_name == 'push'
              and addon_changed
              and not version_changed
              and not bot_bump_commit
          )
          should_notify = not bot_bump_commit

          print(f'current_version={current_version}')
          print(f'previous_version={previous_version}')
          print(f'addon_changed={str(addon_changed).lower()}')
          print(f'version_changed={str(version_changed).lower()}')
          print(f'bot_bump_commit={str(bot_bump_commit).lower()}')
          print(f'should_bump={str(should_bump).lower()}')
          print(f'should_notify={str(should_notify).lower()}')
          PY

      - name: Bump addon.xml patch version
        id: bump
        if: steps.detect.outputs.should_bump == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          path = Path('addon.xml')
          text = path.read_text(encoding='utf-8')
          match = re.search(r'version="(\d+)\.(\d+)\.(\d+)"', text)
          if not match:
              raise SystemExit('addon.xml version must use MAJOR.MINOR.PATCH')
          major, minor, patch = map(int, match.groups())
          old_version = f'{major}.{minor}.{patch}'
          new_version = f'{major}.{minor}.{patch + 1}'
          text = text.replace(f'version="{old_version}"', f'version="{new_version}"', 1)
          path.write_text(text, encoding='utf-8')
          print(f'old_version={old_version}')
          print(f'new_version={new_version}')
          PY

          new_version=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('addon.xml').read_text(encoding='utf-8')
          match = re.search(r'version="(\d+\.\d+\.\d+)"', text)
          if not match:
              raise SystemExit('addon.xml version must use MAJOR.MINOR.PATCH')
          print(match.group(1))
          PY
          )

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add addon.xml
          git commit -m "chore: bump plugin.video.twitch to ${new_version}"
          git push
          echo "notify_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "notify_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Select notification payload
        id: payload
        if: steps.detect.outputs.should_notify == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.detect.outputs.should_bump }}" = "true" ]; then
            echo "sha=${{ steps.bump.outputs.notify_sha }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.bump.outputs.notify_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.detect.outputs.current_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger repository update
        if: steps.detect.outputs.should_notify == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: ${{ env.REPOSITORY_REPO }}
          event-type: addon-updated
          client-payload: '{"addon": "${{ env.ADDON_ID }}", "ref": "refs/heads/main", "sha": "${{ steps.payload.outputs.sha }}", "version": "${{ steps.payload.outputs.version }}"}'
